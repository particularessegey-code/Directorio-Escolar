<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Escuelas Particulares</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Librería para exportar a Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        body { background-color: #f4f7f6; }
        .login-container { max-width: 400px; margin: 100px auto; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-container card shadow-sm" id="loginScreen">
    <div class="card-body p-5">
        <h3 class="text-center mb-4">Control de Escuelas</h3>
        <div id="loginError" class="alert alert-danger d-none"></div>
        <input type="text" id="txtUser" class="form-control mb-3" placeholder="Usuario">
        
        <div class="input-group mb-4">
            <input type="password" id="txtPass" class="form-control" placeholder="Contraseña" onkeypress="if(event.key==='Enter') login()">
            <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                <i class="bi bi-eye-slash" id="eyeIcon"></i>
            </button>
        </div>

        <button class="btn btn-primary w-100" id="btnLogin" onclick="login()">
            <span id="loginSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
            Ingresar
        </button>
    </div>
</div>

<!-- DASHBOARD -->
<div class="container-fluid py-4 d-none" id="dashboardScreen">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <h3 class="mb-0">Escuelas - <span class="badge bg-secondary" id="lblNivel"></span></h3>
        <div>
            <button class="btn btn-success" onclick="openCreateModal()"><i class="bi bi-plus-circle"></i> Agregar</button>
            <button class="btn btn-info text-white" onclick="exportToExcel()"><i class="bi bi-file-earmark-excel"></i> Descargar Excel</button>
            <button class="btn btn-outline-danger ms-2" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Salir</button>
        </div>
    </div>
    
    <div class="card shadow-sm mb-4">
        <div class="card-body d-flex justify-content-between align-items-center">
            <input type="text" id="searchInput" class="form-control w-75" placeholder="Buscar por Nombre o Clave..." onkeyup="filterTable()">
            <span class="text-muted" id="lblCount">0 escuelas</span>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover table-bordered align-middle">
                    <thead class="table-dark text-center">
                        <tr>
                            <th>NUM</th><th>CLAVE</th><th>NOMBRE</th><th>TURNO</th><th>MUNICIPIO</th><th>AREA</th><th>STATUS</th><th>ACCIONES</th>
                        </tr>
                    </thead>
                    <tbody id="tblData"></tbody>
                </table>
            </div>
            <!-- Paginación -->
            <nav aria-label="Paginación" class="mt-4 d-flex justify-content-center">
                <ul class="pagination" id="pagination"></ul>
            </nav>
        </div>
    </div>
</div>

<!-- MODAL PARA CREAR/EDITAR -->
<div class="modal fade" id="schoolModal" tabindex="-1">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="modalTitle">Escuela</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="txtRow">
                <div class="row g-3">
                    <div class="col-md-1"><label>NUM</label><input type="text" id="txtNum" class="form-control" readonly></div>
                    <div class="col-md-2"><label>CLAVE C.C.T.</label><input type="text" id="txtClave" class="form-control"></div>
                    <div class="col-md-5"><label>NOMBRE ESCUELA</label><input type="text" id="txtNombre" class="form-control"></div>
                    <div class="col-md-2"><label>NIVEL</label><input type="text" id="txtNivel" class="form-control" readonly></div>
                    <div class="col-md-2"><label>TURNO</label><select id="txtTurno" class="form-control">
                        <option value="MATUTINO">MATUTINO</option><option value="VESPERTINO">VESPERTINO</option>
                    </select></div>
                    
                    <div class="col-md-3"><label>MUNICIPIO</label><input type="text" id="txtMunicipio" class="form-control"></div>
                    <div class="col-md-3"><label>LOCALIDAD</label><input type="text" id="txtLocalidad" class="form-control"></div>
                    <div class="col-md-6"><label>DIRECCION</label><input type="text" id="txtDireccion" class="form-control"></div>
                    
                    <div class="col-md-4"><label>REPRESENTANTE LEGAL</label><input type="text" id="txtRepresentante" class="form-control"></div>
                    <div class="col-md-4"><label>TELEFONOS</label><input type="text" id="txtTelefonos" class="form-control"></div>
                    <div class="col-md-4"><label>CORREO ELECTRONICO</label><input type="email" id="txtCorreo" class="form-control"></div>
                    
                    <!-- Cambio a texto libre para múltiples acuerdos separados por diagonal -->
                    <div class="col-md-3"><label>ACUERDO(S)</label><input type="text" id="txtAcuerdo" class="form-control" placeholder="Ej. 123/456"></div>
                    <div class="col-md-3"><label>FECHA DE ACUERDO(S)</label><input type="text" id="txtFechaAcuerdo" class="form-control" placeholder="Ej. 12/10/2023 / 15/06/2024"></div>
                    <div class="col-md-2"><label>TOTAL ACUERDOS</label><input type="number" id="txtTotalAcuerdos" class="form-control"></div>
                    <div class="col-md-2"><label>STATUS</label><select id="txtStatus" class="form-control">
                        <option value="ACTIVO">ACTIVO</option><option value="INACTIVO">INACTIVO</option>
                    </select></div>
                    <div class="col-md-2"><label>AREA</label><input type="text" id="txtArea" class="form-control"></div>
                    
                    <div class="col-md-3"><label>VISITADOR</label><input type="text" id="txtVisitador" class="form-control"></div>
                    <div class="col-md-9"><label>OBSERVACIONES</label><input type="text" id="txtObservaciones" class="form-control"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" id="btnSaveModal" onclick="saveSchool()">Guardar Cambios</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxS91AeIYSp--ZiTIS4zsq0wDJWuwEzUjJCAHIygbuXTR8bS3TFfM0Z04uSqtwkMKAM/exec'; // ¡NO OLVIDES TU URL!
    let currentUser = null;
    let currentData = [];
    let filteredData = [];

    // Variables de Paginación
    let currentPage = 1;
    const rowsPerPage = 50; // Mostrar 50 escuelas por página

    // Función del ojo para la contraseña
    document.getElementById('togglePassword').addEventListener('click', function () {
        const passInput = document.getElementById('txtPass');
        const eyeIcon = document.getElementById('eyeIcon');
        if (passInput.type === 'password') {
            passInput.type = 'text';
            eyeIcon.classList.remove('bi-eye-slash');
            eyeIcon.classList.add('bi-eye');
        } else {
            passInput.type = 'password';
            eyeIcon.classList.remove('bi-eye');
            eyeIcon.classList.add('bi-eye-slash');
        }
    });

    async function apiRequest(params, method='GET', body=null) {
        let url = API_URL;
        let options = { method: method };
        if(method === 'GET') {
            url += '?' + new URLSearchParams(params).toString();
        } else {
            options.body = JSON.stringify(body);
        }
        const resp = await fetch(url, options);
        return await resp.json();
    }

    async function login() {
        const btnLogin = document.getElementById('btnLogin');
        const spinner = document.getElementById('loginSpinner');
        const user = document.getElementById('txtUser').value.trim();
        const pass = document.getElementById('txtPass').value.trim();
        
        btnLogin.disabled = true;
        spinner.classList.remove('d-none');

        const res = await apiRequest({ action: 'login', username: user, password: pass });
        
        btnLogin.disabled = false;
        spinner.classList.add('d-none');

        if(res.success) {
            currentUser = res.user;
            currentUser.pass = pass;
            document.getElementById('loginScreen').classList.add('d-none');
            document.getElementById('dashboardScreen').classList.remove('d-none');
            document.getElementById('lblNivel').innerText = currentUser.nivel;
            loadData();
        } else {
            document.getElementById('loginError').innerText = res.message;
            document.getElementById('loginError').classList.remove('d-none');
        }
    }

    function logout() {
        currentUser = null;
        document.getElementById('loginScreen').classList.remove('d-none');
        document.getElementById('dashboardScreen').classList.add('d-none');
        document.getElementById('txtPass').type = 'password';
    }

    async function loadData() {
        const res = await apiRequest({ action: 'read', username: currentUser.username, password: currentUser.pass });
        if(res.success) {
            currentData = res.data;
            document.getElementById('searchInput').value = '';
            filterTable(); // Iniciar la tabla y la paginación
        } else {
            alert("Error al cargar datos: " + res.message);
        }
    }
        // Función para quitar acentos y pasar a minúsculas para la búsqueda
    function normalizeString(str) {
        return str.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

        function filterTable() {
        const searchTerm = normalizeString(document.getElementById('searchInput').value);
        filteredData = currentData.filter(row => {
            // Normalizamos los datos de la fila para compararlos sin acentos y en minúsculas
            const nombre = normalizeString(row['NOMBRE ESCUELA'] || '');
            const clave = normalizeString(row['CLAVE C.C.T.'] || '');
            return nombre.includes(searchTerm) || clave.includes(searchTerm);
        });
        currentPage = 1; // Reiniciar a página 1 al buscar
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('tblData');
        tbody.innerHTML = '';
        
        const totalItems = filteredData.length;
        const totalPages = Math.ceil(totalItems / rowsPerPage);
        
        const startIndex = (currentPage - 1) * rowsPerPage;
        const endIndex = startIndex + rowsPerPage;
        const pageData = filteredData.slice(startIndex, endIndex);

        document.getElementById('lblCount').innerText = `${totalItems} escuelas encontradas`;

        if(pageData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center text-danger">No se encontraron escuelas.</td></tr>';
        } else {
            pageData.forEach(row => {
                tbody.innerHTML += `
                    <tr>
                        <td class="text-center">${row['NUM.']}</td>
                        <td>${row['CLAVE C.C.T.']}</td>
                        <td>${row['NOMBRE ESCUELA']}</td>
                        <td>${row['TURNO']}</td>
                        <td>${row['MUNICIPIO']}</td>
                        <td>${row['AREA']}</td>
                        <td class="text-center"><span class="badge bg-${row['STATUS']==='ACTIVO'?'success':'danger'}">${row['STATUS']}</span></td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-info text-white me-1" onclick='openViewModal(${JSON.stringify(row)})'><i class="bi bi-eye"></i></button>
                            <button class="btn btn-sm btn-warning me-1" onclick='openEditModal(${JSON.stringify(row)})'><i class="bi bi-pencil-square"></i></button>
                            ${currentUser.nivel === 'ADMIN' ? `<button class="btn btn-sm btn-danger" onclick="deleteSchool(${row._row}, ${row['NUM.']})"><i class="bi bi-trash"></i></button>` : ''}
                        </td>
                    </tr>
                `;
            });
        }
        renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
        const paginationEl = document.getElementById('pagination');
        paginationEl.innerHTML = '';

        if (totalPages <= 1) return;

        // Botón Anterior
        paginationEl.innerHTML += `
            <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                <a class="page-link" href="#" onclick="changePage(${currentPage - 1})">Anterior</a>
            </li>
        `;

        // Números de página (mostrar máximo 5 alrededor de la actual)
        let startPage = Math.max(1, currentPage - 2);
        let endPage = Math.min(totalPages, currentPage + 2);

        if(startPage > 1) paginationEl.innerHTML += `<li class="page-item disabled"><a class="page-link" href="#">...</a></li>`;

        for (let i = startPage; i <= endPage; i++) {
            paginationEl.innerHTML += `
                <li class="page-item ${i === currentPage ? 'active' : ''}">
                    <a class="page-link" href="#" onclick="changePage(${i})">${i}</a>
                </li>
            `;
        }

        if(endPage < totalPages) paginationEl.innerHTML += `<li class="page-item disabled"><a class="page-link" href="#">...</a></li>`;

        // Botón Siguiente
        paginationEl.innerHTML += `
            <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
                <a class="page-link" href="#" onclick="changePage(${currentPage + 1})">Siguiente</a>
            </li>
        `;
    }

    function changePage(page) {
        event.preventDefault(); // Evitar salto en la página
        const totalPages = Math.ceil(filteredData.length / rowsPerPage);
        if (page >= 1 && page <= totalPages) {
            currentPage = page;
            renderTable();
            window.scrollTo(0, 0); // Subir al inicio de la tabla
        }
    }

    // FUNCIÓN PARA EXPORTAR A EXCEL
    function exportToExcel() {
        if(filteredData.length === 0) {
            alert("No hay datos para exportar.");
            return;
        }
        // Limpiar la propiedad interna _row para que no aparezca en el Excel
        const dataToExport = filteredData.map(row => {
            const {_row, ...rest} = row;
            return rest;
        });

        const ws = XLSX.utils.json_to_sheet(dataToExport);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Escuelas");
        XLSX.writeFile(wb, `Escuelas_${currentUser.nivel}.xlsx`);
    }

        function openCreateModal() {
        document.getElementById('modalTitle').innerText = 'Agregar Nueva Escuela';
        document.getElementById('txtRow').value = '';
        document.querySelectorAll('#schoolModal input:not([readonly]), #schoolModal select').forEach(i => i.value = '');
        document.getElementById('txtNum').value = 'Auto'; 
        document.getElementById('txtNivel').value = currentUser.nivel === 'ADMIN' ? '' : currentUser.nivel;

        // Desbloquear campos para edición
        document.querySelectorAll('#schoolModal input, #schoolModal select').forEach(el => {
            if (el.tagName === 'SELECT') {
                el.disabled = false;
            } else {
                el.readOnly = false;
            }
        });
        document.getElementById('txtNum').readOnly = true;
        document.getElementById('txtNivel').readOnly = true;

        // Mostrar botón de guardar
        document.getElementById('btnSaveModal').style.display = 'inline-block';

        new bootstrap.Modal(document.getElementById('schoolModal')).show();
    }
        function openEditModal(row) {
        document.getElementById('modalTitle').innerText = 'Editar Escuela';
        document.getElementById('txtRow').value = row._row;
        document.getElementById('txtNum').value = row['NUM.'];
        document.getElementById('txtClave').value = row['CLAVE C.C.T.'];
        document.getElementById('txtNombre').value = row['NOMBRE ESCUELA'];
        document.getElementById('txtNivel').value = row['NIVEL'];
        document.getElementById('txtTurno').value = row['TURNO'];
        document.getElementById('txtMunicipio').value = row['MUNICIPIO'];
        document.getElementById('txtLocalidad').value = row['LOCALIDAD'];
        document.getElementById('txtDireccion').value = row['DIRECCION'];
        document.getElementById('txtRepresentante').value = row['REPRESENTANTE LEGAL'];
        document.getElementById('txtTelefonos').value = row['TELEFONOS'];
        document.getElementById('txtCorreo').value = row['CORREO ELECTRONICO'];
        document.getElementById('txtAcuerdo').value = row['ACUERDO'];
        document.getElementById('txtFechaAcuerdo').value = row['FECHA DE ACUERDO'];
        document.getElementById('txtTotalAcuerdos').value = row['TOTAL DE ACUERDOS'];
        document.getElementById('txtStatus').value = row['STATUS'];
        document.getElementById('txtArea').value = row['AREA'];
        document.getElementById('txtVisitador').value = row['VISITADOR'];
        document.getElementById('txtObservaciones').value = row['OBSERVACIONES'];

        // Desbloquear campos para edición
        document.querySelectorAll('#schoolModal input, #schoolModal select').forEach(el => {
            if (el.tagName === 'SELECT') {
                el.disabled = false;
            } else {
                el.readOnly = false;
            }
        });
        // Respetar restricciones permanentes
        document.getElementById('txtNum').readOnly = true;
        document.getElementById('txtNivel').readOnly = true;

        // Mostrar botón de guardar
        document.getElementById('btnSaveModal').style.display = 'inline-block';

        new bootstrap.Modal(document.getElementById('schoolModal')).show();
    }
        function openViewModal(row) {
        document.getElementById('modalTitle').innerText = 'Detalles de la Escuela';
        document.getElementById('txtRow').value = row._row;
        document.getElementById('txtNum').value = row['NUM.'];
        document.getElementById('txtClave').value = row['CLAVE C.C.T.'];
        document.getElementById('txtNombre').value = row['NOMBRE ESCUELA'];
        document.getElementById('txtNivel').value = row['NIVEL'];
        document.getElementById('txtTurno').value = row['TURNO'];
        document.getElementById('txtMunicipio').value = row['MUNICIPIO'];
        document.getElementById('txtLocalidad').value = row['LOCALIDAD'];
        document.getElementById('txtDireccion').value = row['DIRECCION'];
        document.getElementById('txtRepresentante').value = row['REPRESENTANTE LEGAL'];
        document.getElementById('txtTelefonos').value = row['TELEFONOS'];
        document.getElementById('txtCorreo').value = row['CORREO ELECTRONICO'];
        document.getElementById('txtAcuerdo').value = row['ACUERDO'];
        document.getElementById('txtFechaAcuerdo').value = row['FECHA DE ACUERDO'];
        document.getElementById('txtTotalAcuerdos').value = row['TOTAL DE ACUERDOS'];
        document.getElementById('txtStatus').value = row['STATUS'];
        document.getElementById('txtArea').value = row['AREA'];
        document.getElementById('txtVisitador').value = row['VISITADOR'];
        document.getElementById('txtObservaciones').value = row['OBSERVACIONES'];

        // Bloquear todos los campos para que sean de solo lectura
        document.querySelectorAll('#schoolModal input, #schoolModal select').forEach(el => {
            if (el.tagName === 'SELECT') {
                el.disabled = true; // Los selects usan disabled
            } else {
                el.readOnly = true; // Los inputs usan readOnly para que no se vean grises
            }
        });

        // Ocultar botón de guardar
        document.getElementById('btnSaveModal').style.display = 'none';

        new bootstrap.Modal(document.getElementById('schoolModal')).show();
    }

    async function saveSchool() {
        const rowId = document.getElementById('txtRow').value;
        const payload = {
            username: currentUser.username,
            password: currentUser.pass,
            action: rowId ? 'update' : 'create',
            row: rowId ? parseInt(rowId) : null,
            data: {
                'NUM.': document.getElementById('txtNum').value === 'Auto' ? '' : document.getElementById('txtNum').value,
                'CLAVE C.C.T.': document.getElementById('txtClave').value,
                'NOMBRE ESCUELA': document.getElementById('txtNombre').value,
                'NIVEL': document.getElementById('txtNivel').value,
                'TURNO': document.getElementById('txtTurno').value,
                'MUNICIPIO': document.getElementById('txtMunicipio').value,
                'LOCALIDAD': document.getElementById('txtLocalidad').value,
                'DIRECCION': document.getElementById('txtDireccion').value,
                'REPRESENTANTE LEGAL': document.getElementById('txtRepresentante').value,
                'TELEFONOS': document.getElementById('txtTelefonos').value,
                'CORREO ELECTRONICO': document.getElementById('txtCorreo').value,
                'ACUERDO': document.getElementById('txtAcuerdo').value,
                'FECHA DE ACUERDO': document.getElementById('txtFechaAcuerdo').value,
                'TOTAL DE ACUERDOS': document.getElementById('txtTotalAcuerdos').value,
                'STATUS': document.getElementById('txtStatus').value,
                'AREA': document.getElementById('txtArea').value,
                'VISITADOR': document.getElementById('txtVisitador').value,
                'OBSERVACIONES': document.getElementById('txtObservaciones').value
            }
        };

        const res = await apiRequest({}, 'POST', payload);
        if(res.success) {
            bootstrap.Modal.getInstance(document.getElementById('schoolModal')).hide();
            loadData();
            alert(res.message);
        } else {
            alert("Error: " + res.message);
        }
    }

    async function deleteSchool(rowId, numEscuela) {
        if(!confirm(`¿Estás seguro de eliminar la escuela NUM ${numEscuela}?`)) return;
        const payload = {
            username: currentUser.username,
            password: currentUser.pass,
            action: 'delete',
            row: rowId
        };
        const res = await apiRequest({}, 'POST', payload);
        if(res.success) {
            loadData();
            alert(res.message);
        } else {
            alert("Error: " + res.message);
        }
    }
</script>
</body>
</html>
