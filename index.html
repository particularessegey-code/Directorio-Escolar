<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Escuelas Particulares</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Librería para exportar a Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        body { background-color: #f4f7f6; }
        .login-container { max-width: 400px; margin: 100px auto; }
        /* Estilo para el enlace del Área */
        .area-link {
            color: #0d6efd;
            text-decoration: underline;
            cursor: pointer;
            font-weight: bold;
        }
        .area-link:hover {
            color: #0a58ca;
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-container card shadow-sm" id="loginScreen">
    <div class="card-body p-5">
        <h3 class="text-center mb-4">Control de Escuelas</h3>
        <div id="loginError" class="alert alert-danger d-none"></div>
        <input type="text" id="txtUser" class="form-control mb-3" placeholder="Usuario">
        
        <div class="input-group mb-4">
            <input type="password" id="txtPass" class="form-control" placeholder="Contraseña" onkeypress="if(event.key==='Enter') login()">
            <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                <i class="bi bi-eye-slash" id="eyeIcon"></i>
            </button>
        </div>

        <button class="btn btn-primary w-100" id="btnLogin" onclick="login()">
            <span id="loginSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
            Ingresar
        </button>
    </div>
</div>

<!-- DASHBOARD -->
<div class="container-fluid py-4 d-none" id="dashboardScreen">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <h3 class="mb-0">Escuelas - <span class="badge bg-secondary" id="lblNivel"></span></h3>
             <div class="d-flex align-items-center gap-2">
            <!-- Campanita de notificaciones -->
            <div class="dropdown">
                <button class="btn btn-light position-relative" type="button" id="btnNotif" data-bs-toggle="dropdown" aria-expanded="false" onclick="markAsRead()">
                    <i class="bi bi-bell-fill"></i>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none" id="notifBadge">0</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end p-3 shadow" style="width: 350px; max-height: 300px; overflow-y: auto;" id="notifList">
                    <li><h6 class="text-center text-muted">Sin notificaciones nuevas</h6></li>
                </ul>
            </div>
            <button class="btn btn-success" onclick="openCreateModal()"><i class="bi bi-plus-circle"></i> Agregar</button>
            <button class="btn btn-info text-white" onclick="exportToExcel()"><i class="bi bi-file-earmark-excel"></i> Descargar Excel</button>
            <button class="btn btn-secondary" onclick="loadData()"><i class="bi bi-arrow-clockwise"></i> Refrescar</button>
            <button class="btn btn-outline-danger ms-2" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Salir</button>
        </div>
    </div>
    
    <div class="card shadow-sm mb-4">
        <div class="card-body d-flex justify-content-between align-items-center">
            <input type="text" id="searchInput" class="form-control w-75" placeholder="Buscar por Nombre o Clave..." onkeyup="filterTable()">
            <span class="text-muted" id="lblCount">0 escuelas</span>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover table-bordered align-middle">
                    <thead class="table-dark text-center">
                        <tr>
                            <th>NUM</th><th>CLAVE</th><th>NOMBRE</th><th>TURNO</th><th>MUNICIPIO</th><th>AREA</th><th>STATUS</th><th>ACCIONES</th>
                        </tr>
                    </thead>
                    <tbody id="tblData"></tbody>
                </table>
            </div>
            <!-- Paginación -->
            <nav aria-label="Paginación" class="mt-4 d-flex justify-content-center">
                <ul class="pagination" id="pagination"></ul>
            </nav>
        </div>
    </div>
</div>

<!-- MODAL PARA CREAR/EDITAR -->
<div class="modal fade" id="schoolModal" tabindex="-1">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="modalTitle">Escuela</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="txtRow">
                <input type="hidden" id="txtUbicacion"> <!-- Campo oculto para preservar la URL al editar -->
                <div class="row g-3">
                    <div class="col-md-1"><label>NUM</label><input type="text" id="txtNum" class="form-control" readonly></div>
                    <div class="col-md-2"><label>CLAVE C.C.T.</label><input type="text" id="txtClave" class="form-control"></div>
                    <div class="col-md-5"><label>NOMBRE ESCUELA</label><input type="text" id="txtNombre" class="form-control"></div>
                    <div class="col-md-2"><label>NIVEL</label><input type="text" id="txtNivel" class="form-control" readonly></div>
                    <div class="col-md-2"><label>TURNO</label><select id="txtTurno" class="form-control">
                        <option value="MATUTINO">MATUTINO</option><option value="VESPERTINO">VESPERTINO</option>
                    </select></div>
                    
                    <div class="col-md-3"><label>MUNICIPIO</label><input type="text" id="txtMunicipio" class="form-control"></div>
                    <div class="col-md-3"><label>LOCALIDAD</label><input type="text" id="txtLocalidad" class="form-control"></div>
                    <div class="col-md-6"><label>DIRECCION</label><input type="text" id="txtDireccion" class="form-control"></div>
                    
                    <div class="col-md-4"><label>REPRESENTANTE LEGAL</label><input type="text" id="txtRepresentante" class="form-control"></div>
                    <div class="col-md-4"><label>TELEFONOS</label><input type="text" id="txtTelefonos" class="form-control"></div>
                    <div class="col-md-4"><label>CORREO ELECTRONICO</label><input type="email" id="txtCorreo" class="form-control"></div>
                    
                    <!-- Cambio a texto libre para múltiples acuerdos separados por diagonal -->
                    <div class="col-md-3"><label>ACUERDO(S)</label><input type="text" id="txtAcuerdo" class="form-control" placeholder="Ej. 123/456"></div>
                    <div class="col-md-3"><label>FECHA DE ACUERDO(S)</label><input type="text" id="txtFechaAcuerdo" class="form-control" placeholder="Ej. 12/10/2023 / 15/06/2024"></div>
                    <div class="col-md-2"><label>TOTAL ACUERDOS</label><input type="number" id="txtTotalAcuerdos" class="form-control"></div>
                    <div class="col-md-2"><label>STATUS</label><select id="txtStatus" class="form-control">
                        <option value="ACTIVO">ACTIVO</option><option value="INACTIVO">INACTIVO</option>
                    </select></div>
                    <div class="col-md-2"><label>AREA</label><input type="text" id="txtArea" class="form-control"></div>
                    
                    <div class="col-md-3"><label>VISITADOR</label><input type="text" id="txtVisitador" class="form-control"></div>
                    <div class="col-md-9"><label>OBSERVACIONES</label><input type="text" id="txtObservaciones" class="form-control"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" id="btnSaveModal" onclick="saveSchool()">Guardar Cambios</button>
            </div>
        </div>
    </div>
</div>

<!-- MODAL PARA VER UBICACIÓN (MAPA) -->
<div class="modal fade" id="mapModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="mapModalTitle"><i class="bi bi-geo-alt-fill"></i> Ubicación</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-0">
                <iframe id="mapFrame" src="" width="100%" height="450" style="border:0; border-radius: 0 0 5px 5px;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <div class="modal-footer">
                <a href="#" id="mapLink" target="_blank" class="btn btn-success"><i class="bi bi-box-arrow-up-right"></i> Abrir en Google Maps</a>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzMsGyhP1U0oscSYR8_4zzKBINUK7soYwDxXj7YXsdYYiudveNyNL4YJGpYIqZj-LCu/exec';
    let currentUser = null;
    let currentData = [];
    let filteredData = [];

    // Variables de Paginación
    let currentPage = 1;
    const rowsPerPage = 50; 

    // DICCIONARIO DE ENLACES DE MY MAPS POR ÁREA
    const AREA_MAPS = {
        "1": "https://www.google.com/maps/d/edit?mid=1O2LZuplQF89Tz5r6dmOFWsXjARzjdJo&usp=sharing",
        "2": "https://www.google.com/maps/d/edit?mid=1ZsjRxT1AAuXPfFYSqvg-kWjw5jOiIts&usp=sharing",
        "3": "https://www.google.com/maps/d/edit?mid=1LWonti-VeOrxEXykGXaG6C8gsHTMGqw&usp=sharing",
        "4": "https://www.google.com/maps/d/edit?mid=1RMRpotaU_C32_lYL2vBtsSUxnhCbBoA&usp=sharing",
        "5": "https://www.google.com/maps/d/edit?mid=1twKhveAcVg6Sm7blQl3wOXI7NEUJfqg&usp=sharing",
        "6": "https://www.google.com/maps/d/edit?mid=1Ng8hQLUigoBWnkn6vGXCPpfpCvyhLoY&usp=sharing",
        "7": "https://www.google.com/maps/d/edit?mid=1nuyb-WCIvLgoDLAco9q3MrV6GxZv0Zg&usp=sharing",
        "8": "https://www.google.com/maps/d/edit?mid=1sHd35NFb_FhpolO-fF994hzPc6i7qfY&usp=sharing",
        "9": "https://www.google.com/maps/d/edit?mid=1iU-cPI36Hfvy0R6_5ZzCHrulINUXtss&usp=sharing",
        "10": "https://www.google.com/maps/d/edit?mid=1Zrw0AZOUgtiSAZmjyKoyCe0HMoZvnOI&usp=sharing",
        "11": "https://www.google.com/maps/d/edit?mid=1m1bA02onQzyeCFn0jLDM8h_JceOxY60&usp=sharing",
        "12": "https://www.google.com/maps/d/edit?mid=16sbaor0eTj_GJxz_pXBptZ02At8hDMQ&usp=sharing",
        "13": "https://www.google.com/maps/d/edit?mid=1IfxZhWrX4J7eo6Pa-E2Gq4NO1CWDesA&usp=sharing",
        "14": "https://www.google.com/maps/d/edit?mid=1eKvPOFXLNy96a8abMdm-11Rycb5Ha88&usp=sharing",
        "15": "https://www.google.com/maps/d/edit?mid=1B9p0qGH-swONp3NiHnzW6jk2it7MwGM&usp=sharing",
        "16": "https://www.google.com/maps/d/edit?mid=1VIUKvbgJSVeYUJZN1ccqGySXYadiv0g&usp=sharing",
        "17": "https://www.google.com/maps/d/edit?mid=1pl9S90DEu1b7RwJ5MxCdaTRkPIkuUi0&usp=sharing",
        "18": "https://www.google.com/maps/d/edit?mid=11wEZini7dosqcdJo5Z1ZSwvmPyrzNOw&usp=sharing",
        "19": "https://www.google.com/maps/d/edit?mid=116fLXXkSl3Mce8VS-3l6T9MrDCY2tNs&usp=sharing",
        "20": "https://www.google.com/maps/d/edit?mid=1ak533QU67TVHO7PMF0V8BuF9Lwgdu4w&usp=sharing",
        "21": "https://www.google.com/maps/d/edit?mid=1UBtrW2XFw9v1Y_E9CZt6FAr3aMHd3I8&usp=sharing",
        "22": "https://www.google.com/maps/d/edit?mid=1zmLOT5SNW1RqyZW6SYZ1k8gcXyyvfhI&usp=sharing",
        "23": "https://www.google.com/maps/d/edit?mid=1GiEpeqQs0qxivxtKRm1hoPcPpcFWeRw&usp=sharing",
        "24": "https://www.google.com/maps/d/edit?mid=1ktzvnk20zG9MUD3xD9lxT6bU-NOgirw&usp=sharing",
        "25": "https://www.google.com/maps/d/edit?mid=182Zw0A-JOlQhdAFaxnhJA1XYoWeLHzI&usp=sharing",
        "26": "https://www.google.com/maps/d/edit?mid=1NHdVwGEKdtbKF2wTWDaGcP3QWq5AFMs&usp=sharing"
    };

    // Función del ojo para la contraseña
    document.getElementById('togglePassword').addEventListener('click', function () {
        const passInput = document.getElementById('txtPass');
        const eyeIcon = document.getElementById('eyeIcon');
        if (passInput.type === 'password') {
            passInput.type = 'text';
            eyeIcon.classList.remove('bi-eye-slash');
            eyeIcon.classList.add('bi-eye');
        } else {
            passInput.type = 'password';
            eyeIcon.classList.remove('bi-eye');
            eyeIcon.classList.add('bi-eye-slash');
        }
    });

    async function apiRequest(params, method='GET', body=null) {
        let url = API_URL;
        let options = { method: method };
        if(method === 'GET') {
            url += '?' + new URLSearchParams(params).toString();
        } else {
            options.body = JSON.stringify(body);
        }
        const resp = await fetch(url, options);
        return await resp.json();
    }

    async function checkNotifications() {
        if (!currentUser || currentUser.nivel !== 'ADMIN') return;
        const res = await apiRequest({ action: 'getNotifications', username: currentUser.username, password: currentUser.pass });
        if (res.success) {
            const notifs = res.data;
            const badge = document.getElementById('notifBadge');
            const list = document.getElementById('notifList');
            if (notifs.length > 0) {
                badge.innerText = notifs.length;
                badge.classList.remove('d-none');
                list.innerHTML = '';
                notifs.forEach(n => {
                    list.innerHTML += `
                        <li class="dropdown-item-text border-bottom pb-2 mb-2">
                            <small class="text-muted">${n.fecha} - <strong>${n.usuario}</strong></small><br>
                            <span>${n.accion}: ${n.detalle}</span>
                        </li>`;
                });
            } else {
                badge.classList.add('d-none');
                list.innerHTML = '<li><h6 class="text-center text-muted">Sin notificaciones nuevas</h6></li>';
            }
        }
    }

    function markAsRead() {
        document.getElementById('notifBadge').classList.add('d-none');
    }

    async function login() {
        const btnLogin = document.getElementById('btnLogin');
        const spinner = document.getElementById('loginSpinner');
        const user = document.getElementById('txtUser').value.trim();
        const pass = document.getElementById('txtPass').value.trim();
        btnLogin.disabled = true;
        spinner.classList.remove('d-none');
        const res = await apiRequest({ action: 'login', username: user, password: pass });
        btnLogin.disabled = false;
        spinner.classList.add('d-none');
        if(res.success) {
            currentUser = res.user;
            currentUser.pass = pass;
            sessionStorage.setItem('crudUser', JSON.stringify(currentUser));
            document.getElementById('loginScreen').classList.add('d-none');
            document.getElementById('dashboardScreen').classList.remove('d-none');
            document.getElementById('lblNivel').innerText = currentUser.nivel;
            loadData();
        } else {
            document.getElementById('loginError').innerText = res.message;
            document.getElementById('loginError').classList.remove('d-none');
        }
    }

    function logout() {
        currentUser = null;
        sessionStorage.removeItem('crudUser');
        document.getElementById('loginScreen').classList.remove('d-none');
        document.getElementById('dashboardScreen').classList.add('d-none');
        document.getElementById('txtPass').type = 'password';
        document.getElementById('txtUser').value = '';
        document.getElementById('txtPass').value = '';
    }

    async function loadData() {
        const res = await apiRequest({ action: 'read', username: currentUser.username, password: currentUser.pass });
        if(res.success) {
            currentData = res.data;
            document.getElementById('searchInput').value = '';
            filterTable(); 
        } else {
            alert("Error al cargar datos: " + res.message);
        }
    }

    function normalizeString(str) {
        return str.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    function filterTable() {
        const searchTerm = normalizeString(document.getElementById('searchInput').value);
        filteredData = currentData.filter(row => {
            const nombre = normalizeString(row['NOMBRE ESCUELA'] || '');
            const clave = normalizeString(row['CLAVE C.C.T.'] || '');
            return nombre.includes(searchTerm) || clave.includes(searchTerm);
        });
        currentPage = 1; 
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('tblData');
        tbody.innerHTML = '';
        const totalItems = filteredData.length;
        const totalPages = Math.ceil(totalItems / rowsPerPage);
        const startIndex = (currentPage - 1) * rowsPerPage;
        const endIndex = startIndex + rowsPerPage;
        const pageData = filteredData.slice(startIndex, endIndex);

        document.getElementById('lblCount').innerText = `${totalItems} escuelas encontradas`;

        if(pageData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" class="text-center text-danger">No se encontraron escuelas.</td></tr>';
        } else {
            pageData.forEach(row => {
                // Verificamos si tiene URL de ubicación para habilitar/deshabilitar el botón
                const hasLocation = row['UBICACION'] && row['UBICACION'].trim() !== '';
                const locationBtn = hasLocation 
                    ? `<button class="btn btn-sm btn-primary me-1" onclick='openLocation(${JSON.stringify(row)})' title="Ver Ubicación"><i class="bi bi-geo-alt-fill"></i></button>`
                    : `<button class="btn btn-sm btn-secondary me-1" disabled title="Sin ubicación"><i class="bi bi-geo-alt-fill"></i></button>`;

                // Lógica para el enlace del Área
                const areaVal = (row['AREA'] || '').toString().trim();
                const areaHtml = AREA_MAPS[areaVal] 
                    ? `<span class="area-link" onclick="openAreaMap('${areaVal}')">${row['AREA']}</span>` 
                    : row['AREA'];

                tbody.innerHTML += `
                    <tr>
                        <td class="text-center">${row['NUM.']}</td>
                        <td>${row['CLAVE C.C.T.']}</td>
                        <td>${row['NOMBRE ESCUELA']}</td>
                        <td>${row['TURNO']}</td>
                        <td>${row['MUNICIPIO']}</td>
                        <td class="text-center">${areaHtml}</td>
                        <td class="text-center"><span class="badge bg-${row['STATUS']==='ACTIVO'?'success':'danger'}">${row['STATUS']}</span></td>
                        <td class="text-center">
                            ${locationBtn}
                            <button class="btn btn-sm btn-info text-white me-1" onclick='openViewModal(${JSON.stringify(row)})'><i class="bi bi-eye"></i></button>
                            <button class="btn btn-sm btn-warning me-1" onclick='openEditModal(${JSON.stringify(row)})'><i class="bi bi-pencil-square"></i></button>
                            ${currentUser.nivel === 'ADMIN' ? `<button class="btn btn-sm btn-danger" onclick="deleteSchool(${row._row}, ${row['NUM.']})"><i class="bi bi-trash"></i></button>` : ''}
                        </td>
                    </tr>
                `;
            });
        }
        renderPagination(totalPages);
    }

    // FUNCIÓN PARA ABRIR EL MAPA DE LA ESCUELA
    function openLocation(row) {
        const url = row['UBICACION'];
        if (!url) return;
        
        let embedUrl = url;
        if (!url.includes('output=embed')) {
            embedUrl += (url.includes('?') ? '&' : '?') + 'output=embed';
        }

        document.getElementById('mapFrame').src = embedUrl;
        document.getElementById('mapLink').href = url;
        document.getElementById('mapModalTitle').innerHTML = `<i class="bi bi-geo-alt-fill"></i> Ubicación de la Escuela`;
        new bootstrap.Modal(document.getElementById('mapModal')).show();
    }

    // NUEVA FUNCIÓN PARA ABRIR EL MAPA DEL ÁREA
    function openAreaMap(area) {
        const url = AREA_MAPS[area];
        if (!url) return;
        
        // Extraer el ID (mid) de la URL de Google My Maps para poder embeberlo
        const midMatch = url.match(/mid=([^&]+)/);
        if (!midMatch) return alert("Error al procesar el mapa del área.");
        
        const embedUrl = `https://www.google.com/maps/d/embed?mid=${midMatch[1]}`;
        
        document.getElementById('mapFrame').src = embedUrl;
        document.getElementById('mapLink').href = url; // El botón abre el editor completo
        document.getElementById('mapModalTitle').innerHTML = `<i class="bi bi-geo-alt-fill"></i> Mapa del Área ${area}`;
        new bootstrap.Modal(document.getElementById('mapModal')).show();
    }

    function renderPagination(totalPages) {
        const paginationEl = document.getElementById('pagination');
        paginationEl.innerHTML = '';
        if (totalPages <= 1) return;
        paginationEl.innerHTML += `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}"><a class="page-link" href="#" onclick="changePage(${currentPage - 1})">Anterior</a></li>`;
        let startPage = Math.max(1, currentPage - 2);
        let endPage = Math.min(totalPages, currentPage + 2);
        if(startPage > 1) paginationEl.innerHTML += `<li class="page-item disabled"><a class="page-link" href="#">...</a></li>`;
        for (let i = startPage; i <= endPage; i++) {
            paginationEl.innerHTML += `<li class="page-item ${i === currentPage ? 'active' : ''}"><a class="page-link" href="#" onclick="changePage(${i})">${i}</a></li>`;
        }
        if(endPage < totalPages) paginationEl.innerHTML += `<li class="page-item disabled"><a class="page-link" href="#">...</a></li>`;
        paginationEl.innerHTML += `<li class="page-item ${currentPage === totalPages ? 'disabled' : ''}"><a class="page-link" href="#" onclick="changePage(${currentPage + 1})">Siguiente</a></li>`;
    }

    function changePage(page) {
        event.preventDefault();
        const totalPages = Math.ceil(filteredData.length / rowsPerPage);
        if (page >= 1 && page <= totalPages) {
            currentPage = page;
            renderTable();
            window.scrollTo(0, 0);
        }
    }

    function exportToExcel() {
        if(filteredData.length === 0) {
            alert("No hay datos para exportar.");
            return;
        }
        const dataToExport = filteredData.map(row => {
            const {_row, ...rest} = row;
            return rest;
        });
        const ws = XLSX.utils.json_to_sheet(dataToExport);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Escuelas");
        XLSX.writeFile(wb, `Escuelas_${currentUser.nivel}.xlsx`);
    }

    function openCreateModal() {
        document.getElementById('modalTitle').innerText = 'Agregar Nueva Escuela';
        document.getElementById('txtRow').value = '';
        document.querySelectorAll('#schoolModal input:not([readonly]):not([type=hidden]), #schoolModal select').forEach(i => i.value = '');
        document.getElementById('txtUbicacion').value = ''; // Limpiar campo oculto
        document.getElementById('txtNum').value = 'Auto'; 
        document.getElementById('txtNivel').value = currentUser.nivel === 'ADMIN' ? '' : currentUser.nivel;
        document.querySelectorAll('#schoolModal input, #schoolModal select').forEach(el => {

    async function saveSchool() {
        const rowId = document.getElementById('txtRow').value;
        const payload = {
            username: currentUser.username,
            password: currentUser.pass,
            action: rowId ? 'update' : 'create',
            row: rowId ? parseInt(rowId) : null,
            data: {
                'NUM.': document.getElementById('txtNum').value === 'Auto' ? '' : document.getElementById('txtNum').value,
                'CLAVE C.C.T.': document.getElementById('txtClave').value,
                'NOMBRE ESCUELA': document.getElementById('txtNombre').value,
                'NIVEL': document.getElementById('txtNivel').value,
                'TURNO': document.getElementById('txtTurno').value,
                'MUNICIPIO': document.getElementById('txtMunicipio').value,
                'LOCALIDAD': document.getElementById('txtLocalidad').value,
                'DIRECCION': document.getElementById('txtDireccion').value,
                'REPRESENTANTE LEGAL': document.getElementById('txtRepresentante').value,
                'TELEFONOS': document.getElementById('txtTelefonos').value,
                'CORREO ELECTRONICO': document.getElementById('txtCorreo').value,
                'ACUERDO': document.getElementById('txtAcuerdo').value,
                'FECHA DE ACUERDO': document.getElementById('txtFechaAcuerdo').value,
                'TOTAL DE ACUERDOS': document.getElementById('txtTotalAcuerdos').value,
                'STATUS': document.getElementById('txtStatus').value,
                'AREA': document.getElementById('txtArea').value,
                'VISITADOR': document.getElementById('txtVisitador').value,
                'OBSERVACIONES': document.getElementById('txtObservaciones').value,
                'UBICACION': document.getElementById('txtUbicacion').value // Se envía el valor oculto para conservarlo
            }
        };
        const res = await apiRequest({}, 'POST', payload);
        if(res.success) {
            bootstrap.Modal.getInstance(document.getElementById('schoolModal')).hide();
            loadData();
            alert(res.message);
        } else {
            alert("Error: " + res.message);
        }
    }

    async function deleteSchool(rowId, numEscuela) {
        if(!confirm(`¿Estás seguro de eliminar la escuela NUM ${numEscuela}?`)) return;
        const payload = { username: currentUser.username, password: currentUser.pass, action: 'delete', row: rowId };
        const res = await apiRequest({}, 'POST', payload);
        if(res.success) {
            loadData();
            alert(res.message);
        } else {
            alert("Error: " + res.message);
        }
    }

    window.addEventListener('DOMContentLoaded', (event) => {
        const savedUser = sessionStorage.getItem('crudUser');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            document.getElementById('loginScreen').classList.add('d-none');
            document.getElementById('dashboardScreen').classList.remove('d-none');
            document.getElementById('lblNivel').innerText = currentUser.nivel;
            loadData(); 
            if(currentUser.nivel === 'ADMIN') {
                checkNotifications(); 
                setInterval(checkNotifications, 60000); 
            }
        }
    });
